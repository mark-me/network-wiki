name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Test matrix — pip, all platforms and Python versions
  # ---------------------------------------------------------------------------
  test:
    name: "pip / Python ${{ matrix.python-version }} / ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
        os: [ubuntu-latest, windows-latest, macos-14]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package with all extras
        run: pip install -e ".[dev,flask]"

      - name: Run tests with coverage
        run: pytest --cov=network_wiki --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Verify uv installation works (Ubuntu, latest Python only)
  # ---------------------------------------------------------------------------
  test-uv:
    name: "uv / Python 3.12 / ubuntu-latest"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Install package with all extras
        run: uv sync --extra dev --extra flask

      - name: Run tests
        run: uv run pytest --cov=network_wiki --cov-report=term-missing

  # ---------------------------------------------------------------------------
  # Build wheel + sdist and verify it is publishable
  # ---------------------------------------------------------------------------
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: [test, test-uv]

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Build wheel and sdist
        run: |
          pip install build
          python -m build

      - name: Check distribution with twine
        run: |
          pip install twine
          twine check dist/*

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v6
        with:
          name: dist
          path: dist/
          retention-days: 7
