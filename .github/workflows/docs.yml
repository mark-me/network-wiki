# Builds the Zensical documentation site and deploys it to GitHub Pages.
#
# Triggered on every push to main/master, and manually via the Actions tab.
#
# Required repository setting (one-time):
#   Settings → Pages → Source → "GitHub Actions"

name: Documentation

on:
  push:
    branches:
      - main
    paths:
      # Only rebuild when docs content or config change
      - "docs-site/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:   # allow manual trigger from the Actions tab

# Grant the GITHUB_TOKEN the minimum permissions needed to deploy Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Prevent two deploys running at the same time; don't cancel a running deploy
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
          cache: "pip"

      - name: Install Zensical
        run: pip install zensical

      - name: Build documentation site
        working-directory: docs-site
        run: python -m zensical build --clean

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
