[project]
site_name        = "Network-wiki"
site_description = "A library for generating interactive HTML wiki pages from igraph networks."
site_author      = "Mark Zwart"
copyright        = "Copyright &copy; 2026 Mark Zwart — MIT Licence"

nav = [
  { "Home" = "index.md" },

  { "Tutorial" = [
    { "Introduction" = "tutorial/index.md" },
    { "Installation" = "tutorial/installation.md" },
    { "Your first graph" = "tutorial/first-graph.md" },
    { "Templates" = "tutorial/templates.md" },
    { "Flask integration" = "tutorial/flask.md" },
  ]},

  { "User guide" = [
    { "Overview" = "user-guide/index.md" },
    { "Graph exporter" = "user-guide/exporter.md" },
    { "Templates" = "user-guide/templates.md" },
    { "Themes" = "user-guide/themes.md" },
    { "Configuration" = "user-guide/configuration.md" },
    { "FAQ" = "user-guide/faq.md" },
  ]},

  { "Developer guide" = [
    { "Overview" = "developer/index.md" },
    { "Architecture" = "developer/architecture.md" },
    { "Rendering pipeline" = "developer/rendering-pipeline.md" },
    { "Package layout" = "developer/package-layout.md" },
    { "Contributing" = "developer/contributing.md" },
  ]},
]

[project.theme]
language = "en"
features = [
  "announce.dismiss",
  "content.code.annotate",
  "content.code.copy",
  "content.code.select",
  "content.footnote.tooltips",
  "content.tabs.link",
  "content.tooltips",
  "navigation.footer",
  "navigation.indexes",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.path",
  "navigation.sections",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
]

[project.theme.icon]
logo = "lucide/network"

[project.theme.font]
text = "Inter"
code = "JetBrains Mono"

[[project.theme.palette]]
scheme      = "default"
primary     = "indigo"
accent      = "indigo"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme      = "slate"
primary     = "indigo"
accent      = "indigo"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.betterem]
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index     = "zensical.extensions.emoji.twemoji"
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums    = true
line_spans         = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style   = true
combine_header_slug = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
[project.markdown_extensions.pymdownx.tilde]
